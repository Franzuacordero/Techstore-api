name: CI/CD Pipeline - TechStore API

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build y Test
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Configurar Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache de dependencias Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Compilar con Maven
        run: mvn compile

      - name: Empaquetar con Maven
        run: mvn clean package -DskipTests

      - name: Verificar JAR generado
        run: ls -la target/*.jar

  docker-build:
    name: Construir imagen Docker
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Configurar Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generar JAR
        run: mvn clean package -DskipTests

      - name: Construir imagen Docker
        run: docker build -t techstore-api:latest .

      - name: Verificar imagen Docker
        run: docker images techstore-api
