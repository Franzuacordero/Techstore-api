# Puerto del servidor
server.port=8080

# Conexión a PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/techstore
spring.datasource.username=admin
spring.datasource.password=admin123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Credenciales del usuario admin (NO van en la BD, solo aquí)
app.security.username=admin@techstore.cl
app.security.password=Admin1234

# Configuración JWT
app.jwt.secret=clave-secreta-muy-larga-para-techstore-chile-2024
app.jwt.expiration=3600000

logging.level.org.springframework.security=DEBUG
